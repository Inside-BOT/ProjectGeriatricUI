<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant Configuration Panel</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #E8F1F8;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Dynamic sandboxed viewport to completely isolate Desktop and Mobile code scopes -->
    <iframe id="app-viewport" src=""></iframe>

    <script>
        function isMobileScreen() {
            return window.matchMedia("(max-width: 768px)").matches;
        }

        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const viewport = document.getElementById('app-viewport');
            
            // Route to either independent desktop or mobile file
            if (isMobileDevice() || isMobileScreen()) {
                viewport.src = "mobile.html";
            } else {
                viewport.src = "desktop.html";
            }
        });
    </script>
</body>
</html>
